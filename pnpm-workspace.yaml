# core-js and core-js-pure ship postinstall scripts that only print funding
# banners; nothing in the build depends on them running. Blocking them is what
# pnpm already does by default, so `false` records the existing behaviour
# explicitly rather than changing it.
#
# These two keys previously carried the literal placeholder text
# "set this to true or false". pnpm 10 ignored the unrecognised value, but
# pnpm 11 rejects it (ERR_PNPM_IGNORED_BUILDS) and refuses to run any script,
# so the repo built in CI and failed on a developer machine.
allowBuilds:
  core-js: false
  core-js-pure: false
